<!DOCTYPE html>
<html>

<head>
    <title>Tailor Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="header">
        <h1>✂️ Tailor Management System</h1>
        <p>Customer Measurement & Order Management</p>
    </div>

    <div class="navigation">

        <a href="/search" class="nav-btn search-btn">
            🔍 Search Customer
        </a>

        <a href="/customers" class="nav-btn customer-btn">
            📋 Customer List
        </a>

    </div>

    <div class="main-container">

        <h2>Add New Customer</h2>

        <form action="/add" method="post">

            <div class="customer-card">

                <h3>👤 Customer Information</h3>

                <label>Name</label>
                <input type="text" name="name" required>

                <label>Phone Number</label>
                <input type="text" name="phone" required>

            </div>

            <div class="measurement-container">

                <div class="measurement-card">

                    <h3>👔 Shirt Measurements</h3>

                    <label>Length</label>
                    <input name="shirt_length">

                    <label>Shoulder</label>
                    <input name="shoulder">

                    <label>Sleeve</label>
                    <input name="sleeve">

                    <label>Chest</label>
                    <input name="chest">

                    <label>Stomach</label>
                    <input name="stomach">

                    <label>Hip</label>
                    <input name="shirt_hip">

                    <label>Collar</label>
                    <input name="collar">

                </div>

                <div class="measurement-card">

                    <h3>👖 Pant Measurements</h3>

                    <label>Length</label>
                    <input name="pant_length">

                    <label>Waist</label>
                    <input name="waist">

                    <label>Hip</label>
                    <input name="pant_hip">

                    <label>Thigh</label>
                    <input name="thigh">

                    <label>Knee</label>
                    <input name="knee">

                    <label>Bottom</label>
                    <input name="bottom">

                    <label>Fork</label>
                    <input name="fork">

                </div>

            </div>

            <button type="submit" class="save-btn">
                💾 Save Customer
            </button>

        </form>

    </div>

</body>

</html>
