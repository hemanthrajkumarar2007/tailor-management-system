<!DOCTYPE html>
<html>

<head>
    <title>Customer List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="header">
        <h1>📋 Customer Records</h1>
        <p>Manage All Tailor Shop Customers</p>
    </div>

    <div class="main-container">

        <div class="navigation">

            <a href="/" class="nav-btn customer-btn">
                ➕ Add Customer
            </a>

            <a href="/search" class="nav-btn search-btn">
                🔍 Search Customer
            </a>

        </div>

        <div class="table-card">

            <table class="customer-table">

                <tr>
                    <th>Bill No</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Edit</th>
                    <th>Delete</th>
                </tr>

                {% for row in rows %}

                <tr>

                    <td>{{row['billno']}}</td>
                    <td>{{row['name']}}</td>
                    <td>{{row['phone']}}</td>

                    <td>
                        <a href="/edit/{{row['billno']}}" class="edit-btn">
                            ✏️ Edit
                        </a>
                    </td>

                    <td>
                        <a href="/delete/{{row['billno']}}" class="delete-btn"
                           onclick="return confirm('Delete this customer?')">
                            🗑 Delete
                        </a>
                    </td>

                </tr>

                {% endfor %}

            </table>

        </div>

    </div>

</body>

</html>
