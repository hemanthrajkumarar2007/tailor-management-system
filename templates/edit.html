<!DOCTYPE html>

<html>

<head>
    <title>Edit Measurements</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

```
<div class="header">
    <h1>✏️ Edit Customer Measurements</h1>
    <p>Update Customer Measurement Details</p>
</div>

<div class="main-container">

    <div class="navigation">

        <a href="/" class="nav-btn customer-btn">
            ➕ Add Customer
        </a>

        <a href="/customers" class="nav-btn search-btn">
            📋 Customer List
        </a>

    </div>

    <form action="/update/{{customer[0]}}" method="post">

        <div class="measurement-card">

            <h3>👔 Shirt Measurements</h3>

            <label>Length</label>
            <input name="shirt_length" value="{{customer[3]}}">

            <label>Shoulder</label>
            <input name="shoulder" value="{{customer[4]}}">

            <label>Sleeve</label>
            <input name="sleeve" value="{{customer[5]}}">

            <label>Chest</label>
            <input name="chest" value="{{customer[6]}}">

            <label>Stomach</label>
            <input name="stomach" value="{{customer[7]}}">

            <label>Hip</label>
            <input name="shirt_hip" value="{{customer[8]}}">

            <label>Collar</label>
            <input name="collar" value="{{customer[9]}}">

        </div>

        <div class="measurement-card">

            <h3>👖 Pant Measurements</h3>

            <label>Length</label>
            <input name="pant_length" value="{{customer[10]}}">

            <label>Waist</label>
            <input name="waist" value="{{customer[11]}}">

            <label>Hip</label>
            <input name="pant_hip" value="{{customer[12]}}">

            <label>Thigh</label>
            <input name="thigh" value="{{customer[13]}}">

            <label>Knee</label>
            <input name="knee" value="{{customer[14]}}">

            <label>Bottom</label>
            <input name="bottom" value="{{customer[15]}}">

            <label>Fork</label>
            <input name="fork" value="{{customer[16]}}">

        </div>

        <button type="submit" class="save-btn">
            💾 Update Measurements
        </button>

    </form>

</div>
```

</body>

</html>
